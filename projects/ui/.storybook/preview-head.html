<!--
  Injected into the <head> of the Storybook preview iframe.

  Angular Material's typography config asks for Roboto and its components render
  ligature icons via Material Symbols. An Angular app gets these from its
  index.html; Storybook has no index.html of its own, so they are declared here.
  Without them, `typography: Roboto` in the theme silently falls back to a system
  font and icon ligatures render as raw text (e.g. the word "menu").
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
  rel="stylesheet"
/>
<!--
  The axis ranges ask for the *variable* Material Symbols font, and they are
  load-bearing rather than decoration: `ui-icon`'s `filled` input moves the
  `FILL` axis, and its `--ui-icon-weight` / `--ui-icon-grade` /
  `--ui-icon-optical-size` hooks move `wght` / `GRAD` / `opsz`. The axis-less
  `…/icon?family=Material+Symbols+Outlined` form loads a static font where all
  four silently do nothing, so the stories would show `filled` as a no-op.

  This is the same declaration a consuming app needs in its index.html — see the
  Icons section of the library README. Storybook's head is not shipped to anyone.
-->
<link
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
  rel="stylesheet"
/>
