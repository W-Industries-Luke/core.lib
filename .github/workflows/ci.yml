name: ci

# Verifies every PR — including the ones the unattended agent opens.
# This is the gate that makes autonomous work reviewable rather than trusted.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build library
        run: npx ng build ui
      # Coverage + thresholds live in angular.json's `test` options, so this
      # single command runs the suite AND fails the job when coverage drops
      # below the threshold. The text-summary reporter prints the numbers here.
      - name: Test library (with coverage threshold)
        run: npx ng test ui --watch=false

  # The built-Storybook smoke gate (#80): build the real Storybook and drive
  # every story through Chromium, failing on console/render errors, non-glyph
  # icons and dark==light. It runs `play()` functions — which `ng build`/`ng test`
  # never do — so it catches "it compiled, it just renders wrong" defects the
  # build job cannot. Its own separate job so a failure reads as a distinct check.
  smoke-stories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Built-Storybook smoke gate
        run: npm run test:stories

  # The a11y gate: render every story in headless Chromium and run axe
  # (@storybook/addon-a11y) against it, in both the published light scheme and a
  # forced dark one, failing on any violation. Its own job — like smoke-stories —
  # so an a11y failure reads as a distinct check, and because it needs a Chromium
  # `build-test` does not. This is the CI half of the README's a11y section; it
  # lands now that `test:a11y` is green on `main` (#163).
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Accessibility checks
        run: npm run test:a11y
      - name: Accessibility checks (dark)
        run: npm run test:a11y:dark
