name: ci

# Verifies every PR — including the ones the unattended agent opens.
# This is the gate that makes autonomous work reviewable rather than trusted.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build library
        run: npx ng build ui
      - name: Test library
        run: npx ng test ui --watch=false

      # One Chromium serves both checks below — the a11y run and the console
      # check share it rather than each installing a browser toolchain.
      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Accessibility checks
        run: npm run test:a11y

      # The checks above render components in a test harness, so neither sees
      # what the real Storybook iframe does — that is how the NG04002 that
      # blanked every button preview reached the published site with CI green
      # (issue #80). These two steps drive the built artefact itself.
      - name: Build Storybook
        run: npm run build-storybook

      - name: Storybook console errors
        run: npm run test:storybook-console
